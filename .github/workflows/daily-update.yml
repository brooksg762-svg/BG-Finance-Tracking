name: Daily internship scrape

on:
  schedule:
    # Runs every day at 11:00 UTC (~6-7am US Eastern)
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: node scripts/scrape.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/postings.json
          git diff --cached --quiet || git commit -m "Daily update: refresh internship postings"
          success=0
          for i in 1 2 3 4 5; do
            if git push; then
              success=1
              break
            fi
            git fetch origin main
            git rebase origin/main
            sleep 2
          done
          if [ "$success" -ne 1 ]; then
            echo "git push failed after retries"
            exit 1
          fi

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (post-scrape) commit
        run: git pull

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
